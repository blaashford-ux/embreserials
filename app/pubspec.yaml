name: embre_serials
description: "Embre Serials - fiction platform for readers and writers."
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6
  url_launcher: ^6.2.6
  go_router: ^14.6.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  multi_select_flutter: ^4.1.3
  flutter_markdown: ^0.7.4+1
  image_picker: ^1.0.7
  intl: ^0.20.2
  http: ^1.6.0
  file_picker: ^8.0.0
  fl_chart: ^0.69.0
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^12.0.2
  connectivity_plus: ^6.1.0
  app_links: ^6.0.0
  flutter_quill: ^11.5.0
  vsc_quill_delta_to_html: ^1.0.1
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  infinite_scroll_pagination: ^4.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4A3F35"
  adaptive_icon_foreground: "assets/icons/app_icon.png"